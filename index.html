<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cola Cases</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange: #FF6B35;
      --orange-mid: #FF8C5A;
      --orange-light: #FFD4C0;
      --cream: #fefcf6;
      --ink: #1A1A2E;
      --ink-light: #4A4A5A;
      --ink-faint: #8A8A9A;
      --card-width: min(95vw, 1000px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      padding: 0 0 80px;
    }

    /* Header */
    .page-header {
      text-align: center;
      padding: 80px 24px 60px;
    }
    .page-header h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 700;
      color: var(--ink);
    }
    .page-header p {
      margin-top: 8px;
      font-size: 16px;
      color: var(--ink-light);
    }

    /* Cards container */
    .cards-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 80px;
    }

    /* Scene & Card */
    .scene {
      width: var(--card-width);
      perspective: 1200px;
    }

    .card {
      width: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
    }

    .card.is-flipped {
      transform: rotateY(180deg);
    }

    .card__face {
      width: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08);
      overflow: hidden;
      background: #fff;
    }

    .card__face--front {
      position: relative;
      cursor: pointer;
    }

    .card__face--back {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      transform: rotateY(180deg);
    }

    /* FRONT: Preview */
    .front-preview {
      width: 100%;
      height: 520px;
      position: relative;
      overflow: hidden;
    }

    .front-preview iframe {
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: none;
    }

    .front-preview__hint {
      position: absolute;
      bottom: 12px;
      right: 16px;
      font-size: 12px;
      color: rgba(255,255,255,0.85);
      background: rgba(0,0,0,0.5);
      padding: 4px 12px;
      border-radius: 20px;
      pointer-events: none;
    }

    /* FRONT: Bottom section */
    .bottom-section {
      display: flex;
      padding: 24px 28px;
      border-top: 1px solid #f0f0f0;
      gap: 24px;
    }

    .bottom-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .title {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 20px;
      color: var(--ink);
    }

    .subtitle {
      font-size: 14px;
      color: var(--ink-light);
      line-height: 1.5;
    }

    .pills {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .pill {
      font-size: 12px;
      font-weight: 500;
      padding: 3px 12px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .pill--1 { background: #FF6B35; color: #fff; }
    .pill--2 { background: #FF8C5A; color: #fff; }
    .pill--3 { background: #FFD4C0; color: #664030; }

    .meta-row {
      display: flex;
      gap: 16px;
      align-items: center;
      font-size: 12px;
      color: var(--ink-light);
    }

    .bottom-right {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-end;
      justify-content: flex-end;
      flex-shrink: 0;
    }

    .btn {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      padding: 8px 20px;
      cursor: pointer;
      border: none;
      transition: transform 0.1s;
    }
    .btn:hover { transform: scale(1.02); }
    .btn--primary { background: #FF6B35; color: white; }
    .btn--outline { background: transparent; border: none; color: var(--ink-faint); font-size: 12px; font-weight: 400; padding: 4px 8px; cursor: pointer; }

    /* BACK */
    .back-wrap {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .back-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .back-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      color: white;
      font-size: 18px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .back-close:hover { background: rgba(0,0,0,0.8); }

    /* Cost Roller */
    .cost-roller {
      display: inline-block;
      cursor: pointer;
      user-select: none;
    }
    .cost-roller__window {
      display: block;
      height: 20px;
      overflow: hidden;
      border-radius: 4px;
    }
    .cost-roller__track {
      display: flex;
      flex-direction: column;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .cost-item {
      height: 20px;
      line-height: 20px;
      padding: 0 8px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 4px;
      white-space: nowrap;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink);
      color: white;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s;
      z-index: 9999;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Responsive */
    @media (max-width: 640px) {
      .front-preview { height: 320px; }
      .bottom-section { flex-direction: column; gap: 16px; }
      .bottom-right { align-items: flex-start; flex-direction: row; gap: 12px; }
      .page-header { padding: 48px 16px 32px; }
      .cards-container { gap: 48px; }
    }
  </style>
</head>
<body>

  <header class="page-header">
    <h1>Cola Cases</h1>
    <p>看看大家用Cola做了什么</p>
  </header>

  <div class="cards-container">

    <!-- Case 1: Vibe Coding 个人网页教程 -->
    <div class="scene">
      <div class="card" data-card="case1">
        <!-- FRONT -->
        <div class="card__face card__face--front">
          <div class="front-preview">
            <iframe src="https://esthersjw.github.io/Cola-awesome/cases/vibe-coding-site/index.html" loading="lazy"></iframe>
            <span class="front-preview__hint">点击翻转查看成果 →</span>
          </div>
          <div class="bottom-section">
            <div class="bottom-left">
              <div class="title">Vibe Coding 个人网页教程</div>
              <div class="subtitle">用Cola的Design Skill一句话生成个人网页，从 Markdown 到上线全流程教程</div>
              <div class="pills">
                <span class="pill pill--1">Design Skill</span>
                <span class="pill pill--2">HTML网页</span>
                <span class="pill pill--3">教程</span>
              </div>
              <div class="meta-row">
                <span>👤 ESTHER不二</span>
                <span>⏱ 30分钟</span>
                <span class="cost-roller" data-roller="case1">
                  <span class="cost-roller__window">
                    <span class="cost-roller__track">
                      <span class="cost-item" style="background: #FF6B35; color: #fff;">Max $10</span>
                      <span class="cost-item" style="background: #FF8C5A; color: #fff;">Pro $8</span>
                      <span class="cost-item" style="background: #FFD4C0; color: #664030;">Lite $1</span>
                    </span>
                  </span>
                </span>
              </div>
            </div>
            <div class="bottom-right">
              <button class="btn btn--primary" data-action="replicate">一键复刻</button>
              <div style="display: flex; gap: 12px; align-items: center;">
                <button class="btn btn--outline" data-action="like" data-key="cola_case1_liked">❤️ <span class="like-count">128</span></button>
                <button class="btn btn--outline" data-action="share">🔗 分享</button>
              </div>
            </div>
          </div>
        </div>
        <!-- BACK -->
        <div class="card__face card__face--back">
          <div class="back-wrap">
            <iframe src="https://esthersjw.github.io/esther-website/" loading="lazy"></iframe>
            <button class="back-close" title="翻回去">↩</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Case 2: 合同管理系统 -->
    <div class="scene">
      <div class="card" data-card="case2">
        <!-- FRONT -->
        <div class="card__face card__face--front">
          <div class="front-preview">
            <iframe src="https://fxy2311-youyou.github.io/cola-pages/contract-system/" loading="lazy"></iframe>
            <span class="front-preview__hint">点击翻转查看成果 →</span>
          </div>
          <div class="bottom-section">
            <div class="bottom-left">
              <div class="title">合同管理系统</div>
              <div class="subtitle">用Cola一句话生成合同全生命周期管理工具，从录入到提醒全自动化</div>
              <div class="pills">
                <span class="pill pill--1">Vibe Coding</span>
                <span class="pill pill--2">Web App</span>
                <span class="pill pill--3">工具</span>
              </div>
              <div class="meta-row">
                <span>👤 Sisi</span>
                <span>⏱ 45分钟</span>
                <span class="cost-roller" data-roller="case2">
                  <span class="cost-roller__window">
                    <span class="cost-roller__track">
                      <span class="cost-item" style="background: #FF6B35; color: #fff;">Max $10</span>
                      <span class="cost-item" style="background: #FF8C5A; color: #fff;">Pro $8</span>
                      <span class="cost-item" style="background: #FFD4C0; color: #664030;">Lite $1</span>
                    </span>
                  </span>
                </span>
              </div>
            </div>
            <div class="bottom-right">
              <button class="btn btn--primary" data-action="replicate">一键复刻</button>
              <div style="display: flex; gap: 12px; align-items: center;">
                <button class="btn btn--outline" data-action="like" data-key="cola_case2_liked">❤️ <span class="like-count">96</span></button>
                <button class="btn btn--outline" data-action="share">🔗 分享</button>
              </div>
            </div>
          </div>
        </div>
        <!-- BACK -->
        <div class="card__face card__face--back">
          <div class="back-wrap">
            <iframe src="https://fxy2311-youyou.github.io/cola-pages/contract-demo/" loading="lazy"></iframe>
            <button class="back-close" title="翻回去">↩</button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script>
    // Toast
    const toast = document.getElementById('toast');
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // Init each card independently
    document.querySelectorAll('.card').forEach(card => {
      const cardId = card.dataset.card;
      const frontFace = card.querySelector('.card__face--front');
      const backClose = card.querySelector('.back-close');
      const btnReplicate = card.querySelector('[data-action="replicate"]');
      const btnLike = card.querySelector('[data-action="like"]');
      const btnShare = card.querySelector('[data-action="share"]');
      const likeCountEl = card.querySelector('.like-count');
      const roller = card.querySelector('.cost-roller');
      const track = roller.querySelector('.cost-roller__track');

      // Cost roller
      let costIndex = 0;
      const costTotal = 3;
      function updateRoller() {
        track.style.transform = `translateY(-${costIndex * 20}px)`;
      }
      roller.addEventListener('wheel', (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (e.deltaY > 0) costIndex = (costIndex + 1) % costTotal;
        else costIndex = (costIndex - 1 + costTotal) % costTotal;
        updateRoller();
      });
      roller.addEventListener('click', (e) => {
        e.stopPropagation();
        costIndex = (costIndex + 1) % costTotal;
        updateRoller();
      });

      // Flip
      frontFace.addEventListener('click', (e) => {
        if (e.target.closest('.btn') || e.target.closest('.cost-roller')) return;
        card.classList.add('is-flipped');
      });
      backClose.addEventListener('click', () => card.classList.remove('is-flipped'));

      // Replicate
      btnReplicate.addEventListener('click', (e) => {
        e.stopPropagation();
        showToast('功能即将上线');
      });

      // Like
      const likeKey = btnLike.dataset.key;
      const baseCount = parseInt(likeCountEl.textContent);
      let liked = localStorage.getItem(likeKey) === '1';
      function updateLike() {
        likeCountEl.textContent = liked ? baseCount + 1 : baseCount;
      }
      updateLike();
      btnLike.addEventListener('click', (e) => {
        e.stopPropagation();
        liked = !liked;
        localStorage.setItem(likeKey, liked ? '1' : '0');
        updateLike();
      });

      // Share
      btnShare.addEventListener('click', async (e) => {
        e.stopPropagation();
        try {
          await navigator.clipboard.writeText(window.location.href);
          showToast('链接已复制到剪贴板');
        } catch { showToast('复制失败'); }
      });
    });
  </script>
</body>
</html>
